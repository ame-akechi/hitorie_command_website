<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HITORIE - 音乐推荐</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" /></head>
<body>

  <!-- ========== 背景装饰光晕 ========== -->
  <div class="bg-orbs">
    <span class="orb1"></span>
    <span class="orb2"></span>
    <span class="orb3"></span>
  </div>

  <!-- ============================================================ -->
  <!-- 第一页：MP3 播放器风格                                        -->
  <!-- ============================================================ -->
  <div id="page1" class="page page-show">
    <div class="bg-gradient-dark" style="position:fixed;inset:0;z-index:-1;"></div>

    <div class="mp3-wrapper">

      <!-- === MP3 设备（左侧） === -->
      <div class="mp3-device-wrap">
        <div class="mp3-device">
          <div class="mp3-brand">✦ HITORIE</div>
          <div class="mp3-screen">
            <img src="hitorie.jpg" alt="HITORIE" />
          </div>
          <div class="mp3-controls">
            <button class="mp3-btn" title="上一曲">
              <svg viewBox="0 0 24 24"><polygon points="16,4 6,12 16,20"/></svg>
            </button>
            <button class="mp3-btn btn-play" onclick="switchToPage(2)" title="乐曲鉴赏">
              ▶
            </button>
            <button class="mp3-btn" title="下一曲">
              <svg viewBox="0 0 24 24"><polygon points="8,4 18,12 8,20"/></svg>
            </button>
          </div>
          <div class="mp3-hint">— 点击播放键鉴赏音乐 —</div>
        </div>
      </div>

      <!-- === 乐队介绍（右侧） === -->
      <div class="mp3-bio">
        <h2>HITORIE</h2>
        <div class="sub">ヒトリエ · J-Rock Band</div>
        <div class="bio-text" id="bioContent">
          <p>加载中<span class="loading-dots"></span></p>
        </div>
      </div>

    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 第二页：碟片播放器 + 底部播放器                               -->
  <!-- ============================================================ -->
  <div id="page2" class="page page-hidden">
    <div class="bg-gradient-dark-2" id="page2Bg" style="position:fixed;inset:0;z-index:-1;"></div>

    <!-- -------- 顶部导航栏 -------- -->
    <nav class="top-nav">
      <div class="nav-left">
        <button class="btn-back" onclick="switchToPage(1)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          返回介绍
        </button>
        <span class="nav-title">♪ <span>乐曲</span>鉴赏</span>
      </div>
      <span class="nav-count" id="songCount"></span>
    </nav>

    <!-- -------- 碟片播放器主体 + 下方信息（与底部播放器同宽居中） -------- -->
    <div class="vinyl-wrapper">
      <div class="vinyl-section">
        <div class="vinyl-container">
          <!-- 左三角：上一曲 -->
          <button class="nav-arrow" id="vinylPrev" title="上一曲">
            <svg viewBox="0 0 24 24"><polygon points="16,4 6,12 16,20" /></svg>
          </button>

          <!-- 碟片 -->
          <div class="vinyl-disc" id="vinylDisc">
            <div class="disc-cover">
              <img src="素材/3分29秒 .jpg" alt="cover" id="discCoverImg" />
            </div>
          </div>

          <!-- 右三角：下一曲 -->
          <button class="nav-arrow" id="vinylNext" title="下一曲">
            <svg viewBox="0 0 24 24"><polygon points="8,4 18,12 8,20" /></svg>
          </button>
        </div>

        <!-- 歌词容器（覆盖碟片区域，不遮挡下方歌名） -->
        <div class="lyrics-container" id="lyricsContainer">
          <div class="lyrics-content" id="lyricsContent">
            <p class="lyrics-loading">加载歌词中...</p>
          </div>
        </div>
      </div>

      <!-- 碟片下方信息 -->
      <div class="vinyl-under">
        <div class="song-title" id="discSongName">3分29秒</div>
        <div class="song-artist" id="discArtist">HITORIE</div>

        <div class="vinyl-progress">
          <span class="v-time" id="discCurrentTime">0:00</span>
          <div class="v-track" id="discTrack">
            <div class="v-fill" id="discFill"></div>
          </div>
          <span class="v-time" id="discDuration">0:00</span>
        </div>

        <div class="vinyl-index" id="vinylIndex">1 / 10</div>

        <!-- 提示点击查看歌词 -->
      <div class="lyrics-hint" id="lyricsHint">— 点击播放器查看歌词 —</div>
      </div>
    </div>

    <!-- -------- 底部固定悬浮全局播放器 -------- -->
    <div class="bottom-player" id="bottomPlayer">
      <div class="player-left">
        <div class="player-cover" id="playerCover">
          <img src="素材/3分29秒 .jpg" alt="cover" />
        </div>
        <div class="player-info">
          <div class="song-name" id="playerSongName">3分29秒</div>
          <div class="artist-name" id="playerArtist">HITORIE</div>
        </div>
      </div>

      <div class="player-center">
        <div class="player-controls">
          <button class="ctrl-btn" id="prevBtn" title="上一曲">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="4" x2="5" y2="20" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="ctrl-btn play-btn" id="playBtn" title="播放/暂停">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="playIcon"><polygon points="8 5 19 12 8 19 8 5"/></svg>
          </button>
          <button class="ctrl-btn" id="nextBtn" title="下一曲">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
          </button>
        </div>
        <div class="progress-wrap">
          <span class="time" id="currentTime">0:00</span>
          <div class="progress-track" id="progressTrack">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="time" id="duration">0:00</span>
        </div>
      </div>

      <div class="player-right">
        <button class="btn-like" id="likeBtn" title="点赞">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="likeIcon">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="loopBtn" title="循环模式">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="loopIcon"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
        <div class="volume-wrap">
          <span class="vol-icon" id="volIcon" title="静音切换">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </span>
          <div class="volume-track" id="volumeTrack">
            <div class="volume-fill" id="volumeFill"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== 全局隐藏的 audio 标签 ========== -->
  <audio id="audioPlayer" preload="metadata"></audio>

  <div class="disclaimer-fixed" id="disclaimerFixed">本网站仅用于中国传媒大学学生作业，一切版权归原作者所有。歌词翻译来源网易云音乐</div>

  <script src="script.js"></script>

</body>
</html>
